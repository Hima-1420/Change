{% extends 'base.html' %}

{% block title %}Visitor Management{% endblock %}

{% block content %}
<div class="glass-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3 style="font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 10px; color: var(--text-primary);">
            <i data-feather="users" style="color: var(--accent);"></i> Verified Subjects Register
        </h3>
        <button class="btn btn-primary" style="padding: 10px 18px; font-size: 0.85rem; border-radius: 10px;" onclick="loadVisitors()">
            <i data-feather="refresh-cw" style="width: 16px; height: 16px;"></i> Refresh Feed
        </button>
    </div>
    <div class="layout-inner-box" style="overflow-x: auto;">
        <table id="visitorsTable">
            <thead>
                <tr>
                    <th>Subject ID</th>
                    <th>Name</th>
                    <th>Credentials</th>
                    <th>Sector Location</th>
                    <th>Authentication Time</th>
                    <th>Clearance Status</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" style="text-align: center; color: var(--text-secondary); padding: 3rem;"><i data-feather="loader" class="spin"></i> Fetching records from central cluster...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
